name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

  test:
    strategy:
      matrix:
        go-version: ['1.26.x']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - run: go test -race -count=1 ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - run: go test -count=1 -coverprofile=coverage.out ./...
      - name: Check 100% coverage
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}')
          echo "Coverage: $total"
          if [ "$total" != "100.0%" ]; then
            echo "FAIL: coverage is $total, want 100.0%"
            exit 1
          fi

  corpus:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - run: go test -tags corpus -timeout 60m -count=1 ./...
